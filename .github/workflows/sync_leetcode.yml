name: Sync Leetcode

on:
  workflow_dispatch: # Allows you to manually trigger the sync anytime
  schedule:
    - cron: "0 8 * * *" # Runs automatically every single day at 8:00 AM UTC

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Run LeetCode Sync Action
        uses: joshcai/leetcode-sync@v1.5
        with:
          github-token: ${{ github.token }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          destination-folder: leetcode-solutions
          verbose: true
          commit-header: '[LeetCode Sync]'
